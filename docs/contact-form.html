<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porto-Fakhul - Contact Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #F5F2EB 0%, #FDFBF7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(42, 42, 42, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #C68A7C 0%, #A3B19B 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .form-container {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2A2A2A;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E5E2DA;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            background-color: #FDFBF7;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #C68A7C;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(198, 138, 124, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .char-count {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
            text-align: right;
        }

        .char-count.warning {
            color: #C68A7C;
            font-weight: 600;
        }

        .form-group input:invalid {
            border-color: #E74C3C;
        }

        .form-group input:valid {
            border-color: #A3B19B;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-submit {
            background: #2A2A2A;
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            background: #C68A7C;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(198, 138, 124, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #E5E2DA;
            color: #2A2A2A;
        }

        .btn-reset:hover {
            background: #D9D5CC;
            transform: translateY(-2px);
        }

        .status-message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .status-message.success {
            background-color: #D4EDDA;
            color: #155724;
            border: 1px solid #C3E6CB;
            display: block;
        }

        .status-message.error {
            background-color: #F8D7DA;
            color: #721C24;
            border: 1px solid #F5C6CB;
            display: block;
        }

        .status-message.loading {
            background-color: #D1ECF1;
            color: #0C5460;
            border: 1px solid #BEE5EB;
            display: block;
        }

        .console-log {
            margin-top: 20px;
            background-color: #1E1E1E;
            color: #00FF00;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .console-log.active {
            display: block;
        }

        .console-log-line {
            margin: 4px 0;
        }

        .console-log-line.success {
            color: #00FF00;
        }

        .console-log-line.error {
            color: #FF6B6B;
        }

        .console-log-line.info {
            color: #87CEEB;
        }

        .footer {
            padding: 20px 30px;
            background-color: #F5F2EB;
            border-top: 1px solid #E5E2DA;
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        .footer a {
            color: #C68A7C;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background-color: #E5E2DA;
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #C68A7C;
            width: 0%;
            transition: width 0.3s ease;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 24px;
            }

            .form-container {
                padding: 30px 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Header -->
            <div class="header">
                <h1>Get In Touch</h1>
                <p>Let's discuss your project ideas and opportunities</p>
            </div>

            <!-- Form Container -->
            <div class="form-container">
                <!-- Progress Bar -->
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <!-- Contact Form -->
                <form id="contactForm" onsubmit="handleSubmit(event)">
                    <!-- Name -->
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input
                            type="text"
                            id="name"
                            name="name"
                            placeholder="John Doe"
                            required
                            minlength="2"
                            maxlength="100"
                        >
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="john@example.com"
                            required
                        >
                    </div>

                    <!-- Subject -->
                    <div class="form-group">
                        <label for="subject">Subject *</label>
                        <input
                            type="text"
                            id="subject"
                            name="subject"
                            placeholder="Project Inquiry"
                            required
                            minlength="3"
                            maxlength="100"
                        >
                    </div>

                    <!-- Message -->
                    <div class="form-group">
                        <label for="message">Message *</label>
                        <textarea
                            id="message"
                            name="message"
                            placeholder="Tell me about your project..."
                            required
                            minlength="10"
                            maxlength="500"
                        ></textarea>
                        <div class="char-count" id="charCount">0/500</div>
                    </div>

                    <!-- Status Message -->
                    <div id="statusMessage" class="status-message"></div>

                    <!-- Console Log -->
                    <div id="consoleLog" class="console-log">
                        <div class="console-log-line info">$ EmailJS Contact Form</div>
                    </div>

                    <!-- Buttons -->
                    <div class="button-group">
                        <button type="submit" class="btn-submit" id="submitBtn">Send Message</button>
                        <button type="reset" class="btn-reset">Clear Form</button>
                    </div>
                </form>
            </div>

            <!-- Footer -->
            <div class="footer">
                <p>Powered by <a href="https://www.emailjs.com" target="_blank">EmailJS</a> • <a href="https://github.com/Lumakara" target="_blank">Portfolio</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        // Initialize EmailJS
        (function() {
            // Initialize with Public Key from environment or hardcoded
            const publicKey = '{{VITE_EMAILJS_PUBLIC_KEY}}';
            if (publicKey && publicKey !== '{{VITE_EMAILJS_PUBLIC_KEY}}') {
                emailjs.init(publicKey);
                logToConsole('EmailJS initialized', 'success');
            }
        })();

        const MAX_MESSAGE_LENGTH = 500;
        const messageInput = document.getElementById('message');
        const charCount = document.getElementById('charCount');
        const contactForm = document.getElementById('contactForm');
        const statusMessage = document.getElementById('statusMessage');
        const consoleLog = document.getElementById('consoleLog');
        const submitBtn = document.getElementById('submitBtn');
        const progressFill = document.getElementById('progressFill');

        // Update character count
        messageInput.addEventListener('input', function() {
            const count = this.value.length;
            charCount.textContent = `${count}/${MAX_MESSAGE_LENGTH}`;
            if (count > MAX_MESSAGE_LENGTH * 0.9) {
                charCount.classList.add('warning');
            } else {
                charCount.classList.remove('warning');
            }
        });

        // Log to console
        function logToConsole(message, type = 'info') {
            const line = document.createElement('div');
            line.className = `console-log-line ${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleLog.appendChild(line);
            consoleLog.classList.add('active');
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        // Update progress bar
        function updateProgress(percent) {
            progressFill.style.width = percent + '%';
        }

        // Show status message
        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;
        }

        // Handle form submission
        async function handleSubmit(event) {
            event.preventDefault();
            
            logToConsole('Initializing EmailJS transport...', 'info');
            updateProgress(10);

            // Validate form
            if (!contactForm.checkValidity()) {
                showStatus('Please fill all required fields correctly', 'error');
                logToConsole('Form validation failed', 'error');
                return;
            }

            // Get form data
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                logToConsole(`Sending message from ${email}...`, 'info');
                updateProgress(30);

                // Send email using EmailJS
                const response = await emailjs.send(
                    '{{VITE_EMAILJS_SERVICE_ID}}',
                    '{{VITE_EMAILJS_TEMPLATE_CONTACT}}',
                    {
                        from_name: name,
                        from_email: email,
                        subject: subject,
                        message: message,
                        reply_to: email,
                        to_email: 'fakhulrohman2@gmail.com',
                        to_name: 'Fakhul Rohman',
                        time: new Date().toLocaleString('id-ID'),
                    }
                );

                logToConsole(`✓ Message sent successfully (ID: ${response.status})`, 'success');
                updateProgress(70);

                // Send auto-reply if enabled
                if ('{{VITE_EMAILJS_TEMPLATE_AUTOREPLY}}' && '{{VITE_EMAILJS_TEMPLATE_AUTOREPLY}}' !== '{{VITE_EMAILJS_TEMPLATE_AUTOREPLY}}') {
                    logToConsole('Sending auto-reply...', 'info');
                    
                    const autoReplyResponse = await emailjs.send(
                        '{{VITE_EMAILJS_SERVICE_ID}}',
                        '{{VITE_EMAILJS_TEMPLATE_AUTOREPLY}}',
                        {
                            to_name: name,
                            to_email: email,
                            from_name: 'Fakhul Rohman',
                            from_email: 'fakhulrohman2@gmail.com',
                            message: message,
                            subject: `Re: ${subject}`,
                            time: new Date().toLocaleString('id-ID'),
                        }
                    );

                    logToConsole(`✓ Auto-reply sent (ID: ${autoReplyResponse.status})`, 'success');
                }

                updateProgress(100);
                showStatus('✓ Message sent successfully! I\'ll get back to you soon.', 'success');
                logToConsole('✓ Process completed successfully', 'success');

                // Reset form
                setTimeout(() => {
                    contactForm.reset();
                    charCount.textContent = '0/500';
                    updateProgress(0);
                    statusMessage.className = 'status-message';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Message';
                }, 2000);

            } catch (error) {
                logToConsole(`✗ Error: ${error.message || 'Failed to send message'}`, 'error');
                updateProgress(0);
                showStatus(`✗ Error: ${error.message || 'Failed to send message'}`, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            }
        }

        // Initialize
        logToConsole('Contact form loaded', 'info');
    </script>
</body>
</html>
